# Tooling configuration only — the app itself is run straight from source
# (python zx-next-unite.py) and packaged with PyInstaller; see CLAUDE.md.

# ── ruff: lint + format ──────────────────────────────────────────────────────
# Deliberately PERMISSIVE: the goal is that NEW code stays clean without
# churning the existing 26k-line monolith. `ruff check .` must stay green on
# the whole repo (it gates nothing otherwise); tighten rules gradually as the
# strangler refactor (zxnu_sdcard_explorer.py etc.) shrinks the legacy code.
# Format new modules with `ruff format <file>` — do NOT format the legacy
# files wholesale, the diff churn would bury real changes.
[tool.ruff]
line-length = 200          # legacy code has very long lines; keep new code sane by taste
target-version = "py313"
extend-exclude = [
    "rc_backgrounds.py",   # generated by pyside6-rcc — never lint or format
    "env",                 # in-place virtualenv some setups use
    "nextsync/sync/z88dk", # z88dk C project (build scripts only)
]

[tool.ruff.lint]
# Ruff's default set (E4/E7/E9 + F pyflakes) plus bugbear's likely-bug checks.
select = ["E4", "E7", "E9", "F", "B"]
ignore = [
    # Legacy-style allowances (pervasive in the monolith; revisit per-module
    # as code moves out of zx-next-unite.py):
    "E401",   # import os, sys on one line
    "E402",   # imports not at the top of the file (deliberate lazy imports)
    "E701",   # multiple statements on one line (compact guard clauses)
    "E702",   # statements separated by semicolons
    "E703",   # trailing semicolons
    "E722",   # bare except (used as last-ditch UI guards)
    "E741",   # ambiguous single-letter names (for l in INIT_LOG, ...)
    "F401",   # unused imports (some are star-import re-exports — do NOT
              # auto-remove from zxnu_config: consumers import * from it)
    "F403",   # from zxnu_config import * (the app's config surface)
    "F405",   # names that may come from a star import
    "F541",   # f-strings without placeholders
    "F841",   # assigned-but-unused locals (often kept for readability)
    "B007",   # unused loop variable (idiomatic in walk loops here)
    "B023",   # closure captures loop variable (Qt connects are call-now)
    "B905",   # zip() without strict= (py3.13 code predates the idiom)
]

[tool.ruff.lint.per-file-ignores]
# The test suite prints PASS/FAIL lines and monkey-patches Qt on purpose.
"tests/*" = ["E501"]
